spring.application.name=phoneshop-backend
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/phoneshop_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JSON Serialization
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.secret=phoneshop-super-secret-key-2024-make-it-very-long-for-security
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# Logging
logging.level.com.phoneshop=INFO

# VNPay Sandbox
vnpay.tmn-code=DEMO_TMN
vnpay.hash-secret=DEMO_HASH_SECRET
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:3000/checkout/vnpay-return
